<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>药店AI系统业务流程图</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', 'SimHei', sans-serif;
            background: #f5f7fa;
            padding: 40px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .flowchart {
            background: white;
            border-radius: 12px;
            padding: 40px;
            margin-bottom: 40px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #1a365d;
            margin-bottom: 40px;
            font-size: 24px;
        }
        .flow-svg {
            width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 流程图1：语音实时识别服务 -->
        <div class="flowchart">
            <h2>业务流程图一：语音实时识别服务</h2>
            <svg class="flow-svg" viewBox="0 0 600 800" xmlns="http://www.w3.org/2000/svg">
                <!-- 背景 -->
                <rect width="600" height="800" fill="#fafbfc"/>

                <!-- 定义箭头 -->
                <defs>
                    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
                        <path d="M0,0 L0,6 L9,3 z" fill="#4a5568"/>
                    </marker>
                </defs>

                <!-- 1. 开始 -->
                <ellipse cx="300" cy="50" rx="60" ry="30" fill="#48bb78" stroke="#38a169" stroke-width="2"/>
                <text x="300" y="55" text-anchor="middle" fill="white" font-size="14" font-weight="bold">开始</text>

                <!-- 箭头 -->
                <line x1="300" y1="80" x2="300" y2="110" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>

                <!-- 2. 店员点击开始录音 -->
                <rect x="210" y="110" width="180" height="50" rx="8" fill="#4299e1" stroke="#3182ce" stroke-width="2"/>
                <text x="300" y="135" text-anchor="middle" fill="white" font-size="13" font-weight="bold">店员点击开始录音</text>
                <text x="300" y="150" text-anchor="middle" fill="#e2e8f0" font-size="10">启动实时转写任务</text>

                <!-- 箭头 -->
                <line x1="300" y1="160" x2="300" y2="190" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>

                <!-- 3. 连接阿里云语音识别 -->
                <rect x="200" y="190" width="200" height="50" rx="8" fill="#63b3ed" stroke="#4299e1" stroke-width="2"/>
                <text x="300" y="215" text-anchor="middle" fill="#1a365d" font-size="12" font-weight="bold">连接阿里云语音识别服务</text>
                <text x="300" y="230" text-anchor="middle" fill="#4a5568" font-size="10">建立 WebSocket 长连接</text>

                <!-- 箭头 -->
                <line x1="300" y1="240" x2="300" y2="270" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>

                <!-- 4. 开始录音 -->
                <rect x="220" y="270" width="160" height="50" rx="8" fill="#ed8936" stroke="#dd6b20" stroke-width="2"/>
                <text x="300" y="295" text-anchor="middle" fill="white" font-size="13" font-weight="bold">开始录音</text>
                <text x="300" y="310" text-anchor="middle" fill="#feebc8" font-size="10">麦克风采集音频</text>

                <!-- 箭头 -->
                <line x1="300" y1="320" x2="300" y2="350" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>

                <!-- 5. 实时上传音频流 -->
                <rect x="200" y="350" width="200" height="50" rx="8" fill="#9ae6b4" stroke="#48bb78" stroke-width="2"/>
                <text x="300" y="375" text-anchor="middle" fill="#1a365d" font-size="12" font-weight="bold">实时上传音频流</text>
                <text x="300" y="390" text-anchor="middle" fill="#2d3748" font-size="10">16kHz/16bit PCM 格式</text>

                <!-- 箭头 -->
                <line x1="300" y1="400" x2="300" y2="430" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>

                <!-- 6. 云端实时转写 -->
                <rect x="200" y="430" width="200" height="60" rx="8" fill="#bee3f8" stroke="#4299e1" stroke-width="2"/>
                <text x="300" y="455" text-anchor="middle" fill="#1a365d" font-size="13" font-weight="bold">云端实时转写</text>
                <text x="300" y="472" text-anchor="middle" fill="#2d3748" font-size="11">阿里云 NLS 语音识别引擎</text>
                <text x="300" y="485" text-anchor="middle" fill="#4a5568" font-size="10">实时返回转写文字</text>

                <!-- 箭头 -->
                <line x1="300" y1="490" x2="300" y2="520" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>

                <!-- 7. 判断：是否停止？ -->
                <polygon points="300,520 380,560 300,600 220,560" fill="#fefcbf" stroke="#d69e2e" stroke-width="2"/>
                <text x="300" y="555" text-anchor="middle" fill="#744210" font-size="12" font-weight="bold">店员是否</text>
                <text x="300" y="572" text-anchor="middle" fill="#744210" font-size="12" font-weight="bold">点击停止？</text>

                <!-- 否 - 循环 -->
                <path d="M 220 560 Q 150 560 150 465 Q 150 370 200 375" fill="none" stroke="#e53e3e" stroke-width="2" marker-end="url(#arrow)"/>
                <text x="130" y="480" fill="#e53e3e" font-size="11" font-weight="bold">否</text>
                <text x="130" y="495" fill="#4a5568" font-size="10">继续录音</text>

                <!-- 是 -->
                <line x1="380" y1="560" x2="450" y2="560" stroke="#48bb78" stroke-width="2" marker-end="url(#arrow)"/>
                <text x="400" y="550" fill="#38a169" font-size="11" font-weight="bold">是</text>

                <!-- 8. 停止录音 -->
                <rect x="450" y="535" width="120" height="50" rx="8" fill="#fc8181" stroke="#e53e3e" stroke-width="2"/>
                <text x="510" y="560" text-anchor="middle" fill="white" font-size="13" font-weight="bold">停止录音</text>
                <text x="510" y="575" text-anchor="middle" fill="#fed7d7" font-size="10">断开连接</text>

                <!-- 箭头 -->
                <line x1="510" y1="585" x2="510" y2="680" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>
                <line x1="510" y1="680" x2="360" y2="680" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>

                <!-- 9. 结束 -->
                <ellipse cx="300" cy="680" rx="60" ry="30" fill="#718096" stroke="#4a5568" stroke-width="2"/>
                <text x="300" y="685" text-anchor="middle" fill="white" font-size="14" font-weight="bold">结束</text>
            </svg>
        </div>

        <!-- 流程图2：语义分析服务 -->
        <div class="flowchart">
            <h2>业务流程图二：语义分析服务</h2>
            <svg class="flow-svg" viewBox="0 0 600 550" xmlns="http://www.w3.org/2000/svg">
                <!-- 背景 -->
                <rect width="600" height="550" fill="#fafbfc"/>

                <!-- 定义箭头 -->
                <defs>
                    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
                        <path d="M0,0 L0,6 L9,3 z" fill="#4a5568"/>
                    </marker>
                </defs>

                <!-- 1. 开始 -->
                <ellipse cx="300" cy="40" rx="60" ry="25" fill="#48bb78" stroke="#38a169" stroke-width="2"/>
                <text x="300" y="45" text-anchor="middle" fill="white" font-size="14" font-weight="bold">开始</text>

                <!-- 箭头 -->
                <line x1="300" y1="65" x2="300" y2="90" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow2)"/>

                <!-- 2. 收到语音转写结果 -->
                <rect x="220" y="90" width="160" height="45" rx="8" fill="#4299e1" stroke="#3182ce" stroke-width="2"/>
                <text x="300" y="110" text-anchor="middle" fill="white" font-size="12" font-weight="bold">收到语音转写结果</text>
                <text x="300" y="125" text-anchor="middle" fill="#e2e8f0" font-size="10">触发语义分析</text>

                <!-- 箭头 -->
                <line x1="300" y1="135" x2="300" y2="160" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow2)"/>

                <!-- 3. 缓存当前对话 -->
                <rect x="230" y="160" width="140" height="45" rx="8" fill="#63b3ed" stroke="#4299e1" stroke-width="2"/>
                <text x="300" y="180" text-anchor="middle" fill="#1a365d" font-size="12" font-weight="bold">缓存当前对话</text>
                <text x="300" y="195" text-anchor="middle" fill="#4a5568" font-size="10">等待完整对话</text>

                <!-- 箭头 -->
                <line x1="300" y1="205" x2="300" y2="230" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow2)"/>

                <!-- 4. 调用大模型分析 -->
                <rect x="220" y="230" width="160" height="45" rx="8" fill="#fbd38d" stroke="#ed8936" stroke-width="2"/>
                <text x="300" y="250" text-anchor="middle" fill="#744210" font-size="12" font-weight="bold">调用大模型</text>
                <text x="300" y="265" text-anchor="middle" fill="#975a16" font-size="10">进行语义分析</text>

                <!-- 箭头 -->
                <line x1="300" y1="275" x2="300" y2="300" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow2)"/>

                <!-- 5. 输出分析结果 -->
                <rect x="200" y="300" width="200" height="55" rx="8" fill="#c6f6d5" stroke="#38a169" stroke-width="2"/>
                <text x="300" y="322" text-anchor="middle" fill="#1a365d" font-size="13" font-weight="bold">输出分析结果</text>
                <text x="300" y="342" text-anchor="middle" fill="#2d3748" font-size="11">顾客需求 / 推荐药品 / 紧急度</text>

                <!-- 循环箭头（虚线） -->
                <path d="M 400 327 Q 520 327 520 215 Q 520 112 400 112" fill="none" stroke="#4299e1" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arrow2)"/>
                <text x="540" y="220" fill="#4299e1" font-size="11" font-weight="bold">有新对话</text>
                <text x="540" y="235" fill="#4a5568" font-size="10">继续分析</text>

                <!-- 箭头 -->
                <line x1="300" y1="355" x2="300" y2="380" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow2)"/>

                <!-- 6. 结束 -->
                <ellipse cx="300" cy="415" rx="60" ry="25" fill="#718096" stroke="#4a5568" stroke-width="2"/>
                <text x="300" y="420" text-anchor="middle" fill="white" font-size="14" font-weight="bold">结束</text>
            </svg>
        </div>
    </div>
</body>
</html>
